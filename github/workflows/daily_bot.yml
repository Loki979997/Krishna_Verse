name: Krishna Reel Bot

on:
  schedule:
    - cron: "30 1 * * *"   # 7:00 AM IST
    - cron: "30 6 * * *"   # 12:00 PM IST
    - cron: "0 13 * * *"   # 6:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      # 🔥 IMPORTANT: Insta session create
      - name: Create Insta Session File
        run: echo "${{ secrets.INSTA_SESSION }}" | base64 -d > session.json

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Save Changes
        run: |
          git config --global user.name "KrishnaBot"
          git config --global user.email "bot@krishna.com"
          git add images/ images_used/
          git commit -m "Moved used image [skip ci]" || echo "No changes"
          git push
